upstream ride_comfort_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Let's Encrypt (when you add a real domain, point DNS here then: sudo certbot --nginx -d your.domain)
server {
    listen 80;
    listen [::]:80;
    server_name 54.169.70.247 _;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 54.169.70.247 _;

    ssl_certificate     /etc/pki/ride-comfort/fullchain.pem;
    ssl_certificate_key /etc/pki/ride-comfort/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://ride_comfort_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
